<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <path id="topArc" d="M 116,138 A 175,175 0 0,1 384,138"/>
    <path id="bottomArc" d="M 116,362 A 175,175 0 0,0 384,362"/>
  </defs>

  <!-- Green outer lotus shape -->
  <path fill="#1a7a1a" d="
    M 250,20
    Q 279,92 323,75
    Q 342,118 413,87
    Q 383,158 426,177
    Q 409,222 480,250
    Q 409,279 426,323
    Q 383,342 413,413
    Q 342,383 323,426
    Q 279,409 250,480
    Q 222,409 177,426
    Q 158,383 87,413
    Q 118,342 75,323
    Q 92,279 20,250
    Q 92,222 75,177
    Q 118,158 87,87
    Q 158,118 177,75
    Q 222,92 250,20 Z"/>

  <!-- White circle background -->
  <circle cx="250" cy="250" r="200" fill="white"/>

  <!-- Outer black ring -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#111" stroke-width="10"/>

  <!-- Inner black ring (text band) -->
  <circle cx="250" cy="250" r="158" fill="none" stroke="#111" stroke-width="9"/>

  <!-- UNIVERSITAS text -->
  <text font-size="26" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="#111" letter-spacing="5">
    <textPath href="#topArc" startOffset="14%">UNIVERSITAS</textPath>
  </text>

  <!-- KHAIRUN text -->
  <text font-size="26" font-weight="900" font-family="Arial Black, Arial, sans-serif" fill="#111" letter-spacing="14">
    <textPath href="#bottomArc" startOffset="18%">KHAIRUN</textPath>
  </text>

  <!-- === Center illustration === -->

  <!-- Stem -->
  <line x1="250" y1="288" x2="250" y2="182" stroke="#2a7a1a" stroke-width="6" stroke-linecap="round"/>

  <!-- Lower large leaves -->
  <path d="M 250,278 C 205,260 178,228 196,196 C 213,222 235,255 250,278 Z" fill="#2a8a1a"/>
  <path d="M 250,278 C 295,260 322,228 304,196 C 287,222 265,255 250,278 Z" fill="#3a9a2a"/>

  <!-- Mid leaves -->
  <path d="M 250,248 C 212,230 190,204 205,175 C 220,198 238,228 250,248 Z" fill="#3a9a2a"/>
  <path d="M 250,248 C 288,230 310,204 295,175 C 280,198 262,228 250,248 Z" fill="#2a8a1a"/>

  <!-- Upper small leaves -->
  <path d="M 250,218 C 220,205 204,183 216,160 C 226,180 240,205 250,218 Z" fill="#4aaa2a"/>
  <path d="M 250,218 C 280,205 296,183 284,160 C 274,180 260,205 250,218 Z" fill="#3a9a2a"/>

  <!-- Cengkeh buds (3 buds at top) -->
  <!-- Center bud -->
  <ellipse cx="250" cy="167" rx="9" ry="20" fill="#b84000"/>
  <ellipse cx="250" cy="155" rx="7" ry="12" fill="#e05000"/>
  <ellipse cx="250" cy="147" rx="5" ry="8" fill="#ff7020"/>

  <!-- Left bud -->
  <g transform="rotate(-22 250 250)">
    <ellipse cx="234" cy="177" rx="7" ry="16" fill="#b84000"/>
    <ellipse cx="234" cy="165" rx="5" ry="10" fill="#e05000"/>
    <ellipse cx="234" cy="157" rx="4" ry="6" fill="#ff7020"/>
  </g>

  <!-- Right bud -->
  <g transform="rotate(22 250 250)">
    <ellipse cx="266" cy="177" rx="7" ry="16" fill="#b84000"/>
    <ellipse cx="266" cy="165" rx="5" ry="10" fill="#e05000"/>
    <ellipse cx="266" cy="157" rx="4" ry="6" fill="#ff7020"/>
  </g>

  <!-- Blue waves (3 lines) -->
  <path d="M 135,300 C 163,285 188,315 216,300 C 244,285 269,315 297,300 C 325,285 348,300 368,300"
        fill="none" stroke="#1a50b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M 132,320 C 160,305 185,335 213,320 C 241,305 266,335 294,320 C 322,305 346,318 368,318"
        fill="none" stroke="#1a50b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M 135,340 C 163,325 188,355 216,340 C 244,325 269,355 297,340 C 325,325 348,340 368,340"
        fill="none" stroke="#1a50b8" stroke-width="8" stroke-linecap="round"/>
</svg>
